services:
  ubersdr_dsc:
    container_name: dsc
    image: madpsy/ubersdr_dsc:latest
    restart: unless-stopped
    environment:
      # UberSDR base URL
      UBERSDR_URL: "http://ubersdr:8080"
      # DSC frequencies in Hz (comma-separated).
      # If not set, all 26 ITU DSC frequencies are monitored by default.
      # Uncomment to restrict to specific frequencies:
      # DSC_FREQS: "2187500,8414500"
      # Uncomment and set as needed:
      # WEB_PORT: "6093"
      # UI_PASSWORD: ""   # Set a password to enable write actions in the web UI.
                          # Leave empty (default) to disable all write actions.
    networks:
      - sdr-network

networks:
  sdr-network:
    external: true
    name: ubersdr_sdr-network
